version: 2

sources:
  - name: staging
    schema: staging
    tables:
      - name: dim_customers
      - name: dim_products
      - name: dim_orders
      - name: dim_payments
      - name: dim_reviews
      - name: dim_geolocation
      - name: dim_sellers
      - name: fact_order_items
      

models:
  - name: dim_customers
    description: "A dimension table containing customer information."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        tests:
          - unique
          - not_null
  - name: dim_geolocation
    description: "A dimension table containing geolocation information."
    columns:
      - name: geolocation_zip_code_prefix
        description: "Zip code prefix for geolocation."
        tests:
          - unique

  - name: dim_orders
    description: "A dimension table containing order information."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null

  - name: dim_payments
    description: "A dimension table containing payment information."
    columns:
      - name: order_id
        description: "Unique identifier for each order, used to link payments to orders."
        tests:
          - unique
          - not_null