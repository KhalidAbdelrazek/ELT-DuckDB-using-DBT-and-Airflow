version: 2

sources:
  - name: staging
    schema: staging
    tables:
      - name: dim_customers
      - name: dim_products
      - name: dim_orders
      - name: dim_payments
      - name: dim_reviews
      - name: dim_geolocation
      - name: dim_sellers
      - name: fact_order_items
      
models:
  - name: fact_order_items
    columns:
      - name: order_id
        tests:
          - relationships:
              name: rel_fact_items_to_orders
              to: ref('dim_orders')
              field: order_id
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        tests:
          - relationships:
              to: ref('dim_sellers')
              field: seller_id

  - name: dim_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
          - relationships:
              name: rel_orders_to_reviews
              to: ref('dim_reviews')
              field: order_id
          - relationships:
              name: rel_orders_to_payments
              to: ref('dim_payments')
              field: order_id
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_zip_code_prefix
        tests:
          - not_null
          - relationships:
              to: ref('dim_geolocation')
              field: geolocation_zip_code_prefix
              config:
                severity: warn

  - name: dim_sellers
    columns:
      - name: seller_id
        tests:
          - unique
          # - not_null
      - name: seller_zip_code_prefix
        tests:
          - relationships:
              to: ref('dim_geolocation')
              field: geolocation_zip_code_prefix
              config:
                severity: warn